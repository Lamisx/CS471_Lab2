{% extends "layouts/base.html" %}
{% block title %}Book Form{% endblock title %}
{% block content %}
<h1>{% if form.instance.pk %}Edit Book{% else %}Add New Book{% endif %}</h1>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <div style="margin-top: 20px;">
        <button type="submit" style="background-color: green; color: white; padding: 10px 20px; border: none; cursor: pointer;">
            Save
        </button>
        <a href="{% url 'listbooks' %}" style="margin-left: 10px;">Cancel</a>
    </div>
</form>
{% endblock content %}
