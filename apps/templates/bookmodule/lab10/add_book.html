{% extends "layouts/base.html" %}

{% block title %}Add New Book{% endblock title %}

{% block content %}
<h1>Add a New Book</h1>

<form method="POST" >
    {% csrf_token %} 
    <p>
        <label>Title:</label><br>
        <input type="text" name="title" required >
    </p>
    <p>
        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" required 
    </p>
    <p>
        <label>Quantity:</label><br>
        <input type="number" name="quantity" value="1" required >
    </p>
    <p>
        <label>Publication Date:</label><br>
        <input type="datetime-local" name="pubdate" required >
    </p>
    <p>
        <label>Rating (1-5):</label><br>
        <input type="number" name="rating" min="1" max="5" value="1" >
    </p>
    <p>
        <label>Publisher:</label><br>
        <select name="publisher" required >
            <option value="">-- Select Publisher --</option>
            {% for pub in publishers %}
                <option value="{{ pub.id }}">{{ pub.name }}</option>
            {% endfor %}
        </select>
    </p>
    <p>
        <label>Authors :</label><br>
        <select name="authors" multiple required >
            {% for author in authors %}
                <option value="{{ author.id }}">{{ author.name }}</option>
            {% endfor %}
        </select>
    </p>

    <button type="submit" style="background-color: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px;">
        Save Book
    </button>
    <a href="{% url 'listbooks' %}" style="margin-left: 15px; text-decoration: none; color: #666;">Cancel</a>
</form>

{% endblock content %}
