{% extends "layouts/base.html" %}
{% block title %}Edit Book{% endblock title %}
{% block content %}
<h1>Edit Book: {{ book.title }}</h1>
<form method="POST" style="max-width: 600px;">
    {% csrf_token %}
    <p>
        <label>Title:</label><br>
        <input type="text" name="title" value="{{ book.title }}" required style="width: 100%;">
    </p>
    <p>
        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" value="{{ book.price }}" required style="width: 100%;">
    </p>
    <p>
        <label>Quantity:</label><br>
        <input type="number" name="quantity" value="{{ book.quantity }}" required style="width: 100%;">
    </p>
    <p>
        <label>Publication Date:</label><br>
        <input type="datetime-local" name="pubdate" value="{{ book.pubdate|date:'Y-m-d\TH:i' }}" required style="width: 100%;">
    </p>
    <p>
        <label>Rating (1-5):</label><br>
        <input type="number" name="rating" min="1" max="5" value="{{ book.rating }}" style="width: 100%;">
    </p>
    <p>
        <label>Publisher:</label><br>
        <select name="publisher" required style="width: 100%;">
            <option value="">-- Select Publisher --</option>
            {% for pub in publishers %}
                <option value="{{ pub.id }}" {% if book.publisher.id == pub.id %}selected{% endif %}>
                    {{ pub.name }}
                </option>
            {% endfor %}
        </select>
    </p>
    <p>
        <label>Authors (Hold Ctrl to select multiple):</label><br>
        <select name="authors" multiple required style="width: 100%; height: 100px;">
            {% for author in authors %}
                <option value="{{ author.id }}" {% if author in book.authors.all %}selected{% endif %}>
                    {{ author.name }}
                </option>
            {% endfor %}
        </select>
    </p>
    <div style="margin-top: 20px;">
        <button type="submit" style="background-color: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px;">
            Update Book
        </button>
        <a href="{% url 'listbooks' %}" style="margin-left: 15px; text-decoration: none; color: #666;">Cancel</a>
    </div>
</form>

{% endblock content %}
