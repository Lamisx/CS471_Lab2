{% extends "layouts/base.html" %}
{% load static %}

{% block title %}Edit Book{% endblock title %}

{% block stylesheets %}
<link rel="stylesheet" href="{% static 'tables_data.css' %}">
<style>
    /* نفس ستايل الـ form-card أعلاه */
    .form-card { background: white; padding: 30px; border-radius: 15px; max-width: 600px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 15px; }
    input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
    .btn-update { background-color: #2980b9; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="form-card">
        <h2 style="text-align: center; color: #2c3e50;">Edit: {{ book.title }}</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Title:</label>
                <input type="text" name="title" value="{{ book.title }}" required>
            </div>
            <div class="form-group">
                <label>Price:</label>
                <input type="number" step="0.01" name="price" value="{{ book.price }}" required>
            </div>
            <div class="form-group">
                <label>Authors:</label>
                <select name="authors" multiple required style="height: 100px;">
                    {% for author in authors %}
                        <option value="{{ author.id }}" {% if author in book.authors.all %}selected{% endif %}>
                            {{ author.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button type="submit" class="btn-update">Update Book</button>
                <a href="{% url 'listbooks' %}" style="margin-left: 10px; color: #7f8c8d;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
