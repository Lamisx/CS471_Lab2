{% extends "layouts/base.html" %}
{% load static %}
{% block stylesheets %}<link rel="stylesheet" href="{% static 'tables_data.css' %}">{% endblock %}

{% block content %}
<div class="container">
    <h2><i class="fa fa-map-marker"></i> Student Statistics by City</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>City Name</th>
                    <th style="text-align: center;">Total Students</th>
                </tr>
            </thead>
            <tbody>
                {% for city in city_stats %}
                <tr>
                    <td style="font-weight: 600; color: #2c3e50;">{{ city.city }}</td>
                    <td style="text-align: center;">
                        <span style="background: #f0f2f5; padding: 6px 15px; border-radius: 20px; font-weight: bold; color: #34495e;">
                            {{ city.student_count }}
                        </span>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="2" style="text-align: center; padding: 30px; color: #999;">No data available</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
