{% extends "layouts/base.html" %}
{% load static %}
{% block stylesheets %}<link rel="stylesheet" href="{% static 'tables_data.css' %}">{% endblock %}

{% block content %}
<div class="container">
    <h2><i class="fa fa-book"></i> Books Availability</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Book Title</th>
                    <th>Quantity</th>
                    <th style="text-align: center;">Availability %</th>
                </tr>
            </thead>
            <tbody>
                {% for book in books %}
                <tr>
                    <td style="font-weight: 600;">{{ book.title }}</td>
                    <td>{{ book.quantity }}</td>
                    <td style="text-align: center;">
                        <div style="background: #e8f8f5; color: #1abc9c; padding: 5px 10px; border-radius: 8px; font-weight: bold; display: inline-block;">
                            {{ book.availability_percentage }}%
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
