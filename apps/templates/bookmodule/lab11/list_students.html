{% extends "layouts/base.html" %}

{% block content %}
  <a href="{% url 'add_student' %}">Add New Student</a>
<table border="1">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>City</th>
        <th>Actions</th>
    </tr>
    {% for s in students %}
    <tr>
        <td>{{ s.name }}</td>
        <td>{{ s.age }}</td>
        <td>{{ s.address.city }}</td>
        <td>
            <a href="{% url 'update_student' s.pk %}">Edit</a> | 
            <a href="{% url 'delete_student' s.pk %}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
