{% extends "layouts/base.html" %}

{% block content %}
<h2>Images Gallery</h2>
<a href="{% url 'upload_image' %}">Upload New Image</a>
<hr>
<div style="display: flex; flex-wrap: wrap; gap: 20px;">
    {% for img in images %}
    <div style="border: 1px solid #ccc; padding: 10px; width: 200px;">
        <h4>{{ img.title }}</h4>
        
        {% if img.image %}
            <img src="{{ img.image.url }}" alt="{{ img.title }}" style="width: 100%; height: auto;">
        {% else %}
            <div style="background: #eee; height: 150px; display: flex; align-items: center; justify-content: center;">
                No Image
            </div>
        {% endif %}
        
        <p>{{ img.description }}</p>
    </div>
    {% empty %}
    <p>No images uploaded yet.</p>
    {% endfor %}
</div>
{% endblock %}
